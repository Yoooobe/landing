# Exemplo de server block — plataforma.4unik.com.br
# Incluir redirects da landing ANTES do proxy_pass /landing/* → GitHub Pages (gh-pages).
# Ver docs/proxy-redirects-4unik.md e scripts/apply-plataforma-nginx-redirects.sh

server {
    listen 443 ssl http2;
    server_name plataforma.4unik.com.br;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # --- Redirects landing (copiar de infra/plataforma-4unik-nginx-redirects.conf) ---
    include /etc/nginx/snippets/plataforma-4unik-landing-redirects.conf;

    # App principal (raiz) — ajustar ao vosso upstream
  # location / { ... }

    # Landing estática (GitHub Pages / gh-pages)
    location /landing/ {
        proxy_pass https://yoooobe.github.io/landing/;
        proxy_ssl_server_name on;
        proxy_set_header Host yoooobe.github.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
