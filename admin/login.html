<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yoobe Admin - Login</title>
    <link rel="icon" href="/logo.png" type="image/png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --bg: #f1f5f9;
        --card: #ffffff;
        --text: #1e293b;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --error: #ef4444;
        --error-bg: #fef2f2;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .login-container {
        background: var(--card);
        border-radius: 20px;
        box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        padding: 3rem;
        width: 100%;
        max-width: 420px;
      }
      .login-logo {
        text-align: center;
        margin-bottom: 2rem;
      }
      .login-logo img {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        box-shadow: 0 4px 16px rgba(79,70,229,0.3);
      }
      .login-logo h1 {
        font-size: 1.75rem;
        color: var(--text);
        margin-top: 1rem;
        font-weight: 800;
      }
      .login-logo p {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-top: 0.25rem;
      }
      .form-group {
        margin-bottom: 1.25rem;
      }
      .form-group label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 0.5rem;
      }
      .form-group input {
        width: 100%;
        padding: 0.875rem 1rem;
        border: 2px solid var(--border);
        border-radius: 12px;
        font-size: 1rem;
        color: var(--text);
        transition: border-color 0.2s;
        outline: none;
      }
      .form-group input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
      }
      .btn-login {
        width: 100%;
        padding: 0.95rem;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 0.5rem;
      }
      .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79,70,229,0.4); }
      .btn-login:active { transform: translateY(0); }
      .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
      .error-msg {
        background: var(--error-bg);
        color: var(--error);
        padding: 0.75rem 1rem;
        border-radius: 10px;
        font-size: 0.875rem;
        margin-bottom: 1rem;
        display: none;
        border: 1px solid rgba(239,68,68,0.2);
      }
      .back-link {
        display: block;
        text-align: center;
        margin-top: 1.5rem;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.875rem;
      }
      .back-link:hover { color: var(--primary); }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-logo">
        <img src="/logo.png" alt="Yoobe" />
        <h1>Yoobe Admin</h1>
        <p>Painel de gestão da landing page</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" placeholder="Digite seu usuário" required autofocus />
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" placeholder="Digite sua senha" required />
        </div>
        <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
      </form>

      <a href="/" class="back-link">← Voltar para o site</a>
    </div>

    <script>
      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnLogin');
        const errEl = document.getElementById('errorMsg');
        btn.disabled = true;
        btn.textContent = 'Entrando...';
        errEl.style.display = 'none';

        try {
          const res = await fetch('/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: document.getElementById('username').value,
              password: document.getElementById('password').value
            })
          });
          const data = await res.json();
          if (data.success) {
            window.location.href = data.redirect;
          } else {
            errEl.textContent = data.message;
            errEl.style.display = 'block';
          }
        } catch (err) {
          errEl.textContent = 'Erro de conexão. Tente novamente.';
          errEl.style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Entrar';
      });
    </script>
  </body>
</html>
