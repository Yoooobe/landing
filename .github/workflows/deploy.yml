# Deploy estático (out/) para GitHub Pages.
#
# Troubleshooting quando NADA corre ou o job nem inicia:
# - Mensagem do GitHub: "account locked" / "billing" → limite ou bloqueio de faturação.
#   Conta: https://github.com/settings/billing — Organização: Settings → Billing do org.
#   Isto não é controlado por este ficheiro; Actions precisam de minutos/plano válido.
#
# Troubleshooting quando o build falha no passo "Verify Sanity secrets":
# - Ver mensagem no log; valores literais de exemplo (your-project-id, xxx) bloqueiam o deploy.
# - "placeholder" gera aviso mas permite o build (Studio em produção pode não funcionar).

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Redeploy após publicar no Sanity (hero e conteúdo em build estático).
  workflow_dispatch:
    inputs:
      note:
        description: "Nota opcional (ex.: após publicar no Sanity)"
        required: false
        type: string
  # Dispara com: POST /repos/{owner}/{repo}/dispatches (event_type sanity-publish). Requer PAT com scope repo.
  repository_dispatch:
    types:
      - sanity-publish

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preflight (billing / Actions)
        run: |
          echo "::notice::Se o workflow não arranca ou o GitHub mostra 'locked due to a billing issue', trata-se de faturação ou minutos de Actions esgotados — https://github.com/settings/billing (conta) ou Billing da organização. Sem isso, nenhum passo deste job corre."
          echo "::notice::Documentação Sanity/CI: docs/cms.md (secrets e checklist pós-deploy)."

      - name: Verify Sanity secrets
        env:
          ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
        run: |
          if [ -z "${ID}" ]; then
            echo "::warning::NEXT_PUBLIC_SANITY_PROJECT_ID está vazio. O export não embute ID real — o Studio em produção pode falhar. Defina em Settings → Secrets → Actions (ver docs/cms.md)."
          elif [ "${ID}" = "your-project-id" ] || [ "${ID}" = "xxx" ]; then
            echo "::error::NEXT_PUBLIC_SANITY_PROJECT_ID não pode ser texto de exemplo (${ID}). Obtém o ID real em https://www.sanity.io/manage e grava o secret em Settings → Secrets → Actions."
            exit 1
          elif [ "${ID}" = "placeholder" ]; then
            echo "::warning::NEXT_PUBLIC_SANITY_PROJECT_ID=placeholder — build segue (alinhado a dev local), mas o Studio em https://yoooobe.github.io/landing/studio/ pode não autenticar. Para produção, usa o ID real do projeto Sanity."
          else
            echo "NEXT_PUBLIC_SANITY_PROJECT_ID definido (valor não mostrado)."
          fi

      - name: Build static export
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          # Nano Banana (Studio): URL pública do gerador; embutida no bundle em build-time (ver next.config.ts)
          SANITY_STUDIO_NANO_BANANA_URL: ${{ secrets.SANITY_STUDIO_NANO_BANANA_URL }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
